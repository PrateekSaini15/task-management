<div class="p-3">
    <div class="d-flex align-items-center">
        <h2 mat-dialog-title class="flex-grow-1">Add Project</h2>
        <button matIconButton (click)="onClose();" color="accent" tabindex="-1"><mat-icon color="accent">close</mat-icon></button>
    </div>
    <form [formGroup]="form" (ngSubmit)="onSubmit();">
        <mat-dialog-content>
            <div>
                <mat-form-field class="w-100">
                    <mat-label>Name</mat-label>
                    <input formControlName="name" matInput />
                    <mat-error>
                        <app-reactive-form-error [reactiveFormControl]="form.get('name')"></app-reactive-form-error>
                    </mat-error>
                </mat-form-field>
            </div>
        </mat-dialog-content>
        <mat-dialog-actions>
            <button matButton="filled" class="w-100">Add</button>
        </mat-dialog-actions>
    </form>
</div>
